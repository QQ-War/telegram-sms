name: Android Auto Build & Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Keystore
        run: cp ./.github/workflows/github-action-only.jks ./app/keys.jks

      - name: Build with Gradle
        run: |
          export KEYSTORE_PASS=000000000
          export ALIAS_NAME="key0"
          export ALIAS_PASS=111111111
          export VERSION_CODE=${{ github.run_number }}
          export VERSION_NAME="GITHUB-${GITHUB_SHA:0:7}"
          chmod +x gradlew
          ./gradlew app:copy_language_pack
          ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk telegram-sms-release.apk

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-sms-apk
          path: telegram-sms-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: telegram-sms-release.apk
          body: "Auto-generated release for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: telegram-sms-release.apk
          body: "This is an automated nightly build from the master branch. SHA: ${{ github.sha }}\nBuild Number: ${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
